<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wishlist</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="./data.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

:root{
  --bg:#f7f7f7;
  --card:#ffffff;
  --border:#e8e8e8;
  --text:#111;
  --muted:#777;
}

body{
  background:var(--bg);
  color:var(--text);
  padding:24px;
}

.wrapper{
  max-width:1300px;
  margin:auto;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  margin-bottom:24px;
}

.title h1{
  font-size:2rem;
  font-weight:700;
}

.title p{
  color:var(--muted);
  margin-top:4px;
}

.controls{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}

input,select{
  border:1px solid var(--border);
  background:white;
  border-radius:12px;
  padding:12px 14px;
  font-size:.95rem;
}

.search{
  min-width:260px;
}

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:16px;
  margin-bottom:24px;
}

.stat{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:18px;
}

.stat span{
  color:var(--muted);
  font-size:.85rem;
}

.stat strong{
  display:block;
  margin-top:6px;
  font-size:1.3rem;
}

.cart-container{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:20px;
}

.cart-item{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  padding:16px;
  cursor:pointer;
  transition:.25s ease;
}

.cart-item:hover{
  transform:translateY(-4px);
  box-shadow:0 12px 30px rgba(0,0,0,.06);
}

.item-image{
  width:100%;
  height:220px;
  object-fit:contain;
  background:#fafafa;
  border-radius:14px;
  padding:10px;
  margin-bottom:14px;
}

.item-title{
  font-size:1rem;
  font-weight:600;
  line-height:1.4;
  margin-bottom:10px;
}

.item-source{
  display:inline-block;
  padding:5px 10px;
  border-radius:999px;
  background:#f2f2f2;
  color:#666;
  font-size:.75rem;
  margin-bottom:12px;
  text-transform:capitalize;
}

.item-price{
  font-size:1.05rem;
  font-weight:700;
}

.checkout{
  position:sticky;
  bottom:20px;
  margin-top:30px;
  background:white;
  border:1px solid var(--border);
  border-radius:20px;
  padding:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
box-shadow: 0 8px 24px rgba(0,0,0,.06);
}

.total{
  font-size:1.3rem;
  font-weight:700;
}

.checkout-btn{
  border:none;
  background:#111;
  color:white;
  padding:12px 20px;
  border-radius:12px;
  cursor:pointer;
}

.checkout-btn:hover{
  opacity:.9;
}

@media(max-width:700px){
  body{
    padding:16px;
  }

  header{
    flex-direction:column;
    align-items:stretch;
  }

  .controls{
    flex-direction:column;
  }

  .search{
    min-width:auto;
  }

  .checkout{
    flex-direction:column;
    text-align:center;
  }

  .checkout-btn{
    width:100%;
  }
}
</style>
</head>
<body>

<div class="wrapper">

<header>
  <div class="title">
    <h1>Wishlist</h1>
    <p>Lista personal de compras y objetivos.</p>
  </div>

  <div class="controls">
    <input class="search" id="searchInput" type="text" placeholder="Buscar producto...">

    <select id="categoryFilter">
      <option value="all">Todos</option>
      <option value="glauser">Glauser</option>
      <option value="mercadolibre">MercadoLibre</option>
      <option value="amazon">Amazon</option>
      <option value="apple">Apple</option>
      <option value="adidas">Adidas</option>
      <option value="nike">Nike</option>
      <option value="unknown">Desconocido</option>
    </select>
  </div>
</header>

<div class="stats">
  <div class="stat">
    <span>Productos visibles</span>
    <strong id="visibleProducts">0</strong>
  </div>

  <div class="stat">
    <span>Valor total</span>
    <strong id="statsTotal">$0</strong>
  </div>

  <div class="stat">
    <span>Categoría</span>
    <strong id="currentCategory">Todas</strong>
  </div>
</div>

<div class="cart-container" id="cart"></div>

<div class="checkout">
  <div class="total" id="totalAmount">Total: $0</div>
  <button class="checkout-btn">Ver objetivos</button>
</div>

</div>

<script>
const cart = document.getElementById('cart');
const filter = document.getElementById('categoryFilter');
const searchInput = document.getElementById('searchInput');

const totalDisplay = document.getElementById('totalAmount');
const statsTotal = document.getElementById('statsTotal');
const visibleProducts = document.getElementById('visibleProducts');
const currentCategory = document.getElementById('currentCategory');

const productos = PRODUCTOS;

function formatCurrency(value){
  return new Intl.NumberFormat('es-CO',{
    style:'currency',
    currency:'COP'
  }).format(value);
}

function createCartItem(product){
  const item = document.createElement('div');

  item.className = 'cart-item';
  item.dataset.source = product.categoria;
  item.dataset.price = product.precio;
  item.dataset.name = product.nombre.toLowerCase();

  item.innerHTML = `
    <img src="${product.imagen}" alt="${product.nombre}" class="item-image">
    <div class="item-title">${product.nombre}</div>
    <div class="item-source">${product.categoria}</div>
    <div class="item-price">${formatCurrency(product.precio)}</div>
  `;

  item.addEventListener('click',()=>{
    window.open(product.link,'_blank');
  });

  return item;
}

function renderCart(){
  const fragment = document.createDocumentFragment();

  productos.forEach(product=>{
    fragment.appendChild(createCartItem(product));
  });

  cart.appendChild(fragment);
}

function updateCartDisplay(){
  const items = document.querySelectorAll('.cart-item');

  const selected = filter.value;
  const search = searchInput.value.toLowerCase().trim();

  let total = 0;
  let count = 0;

  items.forEach(item=>{

    const categoryMatch =
      selected === 'all' ||
      item.dataset.source === selected;

    const searchMatch =
      item.dataset.name.includes(search);

    const visible =
      categoryMatch && searchMatch;

    item.style.display =
      visible ? 'block' : 'none';

    if(visible){
      total += Number(item.dataset.price);
      count++;
    }
  });

  totalDisplay.textContent =
    `Total: ${formatCurrency(total)}`;

  statsTotal.textContent =
    formatCurrency(total);

  visibleProducts.textContent =
    count;

  currentCategory.textContent =
    selected === 'all'
      ? 'Todas'
      : selected;
}

filter.addEventListener('change', updateCartDisplay);
searchInput.addEventListener('input', updateCartDisplay);

window.addEventListener('DOMContentLoaded',()=>{
  renderCart();
  updateCartDisplay();
});
</script>

</body>
</html>
