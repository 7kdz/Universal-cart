<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="color-scheme" content="light dark" />

    <title>Wishlist</title>

    <link rel="stylesheet" href="./styles.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="./data.js"></script>
  </head>

  <body>
    <div class="wrapper">
      <header>
        <div class="title">
          <h1>Wishlist</h1>
          <p>Lista personal de compras y objetivos.</p>
        </div>

        <div class="controls">
          <input
            class="search"
            id="searchInput"
            type="text"
            placeholder="Buscar producto..."
          />

          <select id="categoryFilter">
            <option value="all">Todos</option>
            <option value="glauser">Glauser</option>
            <option value="mercadolibre">MercadoLibre</option>
            <option value="amazon">Amazon</option>
            <option value="apple">Apple</option>
            <option value="adidas">Adidas</option>
            <option value="nike">Nike</option>
            <option value="unknown">Desconocido</option>
          </select>
        </div>
      </header>

      <div class="stats">
        <div class="stat">
          <span>Productos visibles</span>
          <strong id="visibleProducts">0</strong>
        </div>

        <div class="stat">
          <span>Valor total</span>
          <strong id="statsTotal">$0</strong>
        </div>

        <div class="stat">
          <span>Categoría</span>
          <strong id="currentCategory">Todas</strong>
        </div>
      </div>

      <div class="cart-container" id="cart"></div>

      <div class="checkout">
        <div class="total" id="totalAmount">Total: $0</div>
        <button class="checkout-btn">Ver objetivos</button>
      </div>
    </div>

    <div id="productModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <div id="modalTitle" class="modal-title">Productos</div>

          <button id="closeModalBtn" class="modal-close" aria-label="Cerrar">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M18 6L6 18" />
              <path d="M6 6L18 18" />
            </svg>
          </button>
        </div>

        <div class="modal-body">
          <div id="modalProducts" class="modal-products"></div>
        </div>
      </div>
    </div>

    <script>
      const cart = document.getElementById("cart");
      const filter = document.getElementById("categoryFilter");
      const searchInput = document.getElementById("searchInput");

      const totalDisplay = document.getElementById("totalAmount");
      const statsTotal = document.getElementById("statsTotal");
      const visibleProducts = document.getElementById("visibleProducts");
      const currentCategory = document.getElementById("currentCategory");

      const productos = PRODUCTOS;

      /*
  Agrupa productos aquí
*/
      const PRODUCT_GROUPS = [
        {
          nombre: "AirPods",
          productos: [3, 4],
          collage: false,
        },
        {
          nombre: "Licras",
          productos: [13, 14],
          collage: false,
        },
        {
          nombre: "Tenis de entrenamiento Dropset Control",
          productos: [22, 23],
          collage: false,
        },
        {
          nombre: "Tenis Rapidmove Go M",
          productos: [24, 25],
          collage: false,
        },
        {
          nombre: "Guayos F50",
          productos: [9, 10],
          collage: false,
        },
        {
          nombre: "Joma",
          productos: [11, 12],
          collage: false,
        },
      ];

      const modal = document.getElementById("productModal");
      const modalProducts = document.getElementById("modalProducts");
      const modalTitle = document.getElementById("modalTitle");

      function openModal() {
        modal.classList.add("active");
        document.body.classList.add("modal-open");
      }

      function closeModal() {
        modal.classList.remove("active");
        document.body.classList.remove("modal-open");
      }

      document
        .getElementById("closeModalBtn")
        .addEventListener("click", closeModal);

      modal.addEventListener("click", (e) => {
        if (e.target === modal) {
          closeModal();
        }
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          closeModal();
        }
      });

      function formatCurrency(value) {
        return new Intl.NumberFormat("es-CO", {
          style: "currency",
          currency: "COP",
        }).format(value);
      }

      function openGroup(group) {
        modalTitle.textContent = group.nombre;

        modalProducts.innerHTML = "";

        group.productos.forEach((id) => {
          const product = productos.find((p) => p.id === id);

          if (!product) return;

          const card = document.createElement("div");

          card.className = "cart-item";

          card.innerHTML = `
      <img
        src="${product.imagen}"
        alt="${product.nombre}"
        class="item-image"
      >

      <div class="item-title">
        ${product.nombre}
      </div>

      <div class="item-source">
        ${product.categoria}
      </div>

      <div class="item-price">
        ${formatCurrency(product.precio)}
      </div>
    `;

          card.addEventListener("click", () => {
            window.open(product.link, "_blank");
          });

          modalProducts.appendChild(card);
        });

        openModal();
      }

      function createCartItem(product) {
        const item = document.createElement("div");

        item.className = "cart-item";

        item.dataset.source = product.categoria;

        item.dataset.price = product.precio;

        item.dataset.name = product.nombre.toLowerCase();

        item.innerHTML = `
    <img
      src="${product.imagen}"
      alt="${product.nombre}"
      class="item-image"
    >

    <div class="item-title">
      ${product.nombre}
    </div>

    <div class="item-source">
      ${product.categoria}
    </div>

    <div class="item-price">
      ${formatCurrency(product.precio)}
    </div>
  `;

        item.addEventListener("click", () => {
          window.open(product.link, "_blank");
        });

        return item;
      }

      function createGroupCard(group) {
        const first = productos.find((p) => p.id === group.productos[0]);

        const item = document.createElement("div");

        item.className = "cart-item";

        item.dataset.source = first.categoria;

        item.dataset.price = Math.min(
          ...group.productos.map((id) => {
            const p = productos.find((x) => x.id === id);

            return p.precio;
          }),
        );

        item.dataset.count = group.productos.length;

        item.dataset.name = group.nombre.toLowerCase();

        let imageHTML = "";

        if (group.collage && group.productos.length >= 2) {
          const p1 = productos.find((p) => p.id === group.productos[0]);

          const p2 = productos.find((p) => p.id === group.productos[1]);

          imageHTML = `
      <div class="group-image">

        <img
          src="${p1.imagen}"
          alt="${p1.nombre}"
        >

        <img
          src="${p2.imagen}"
          alt="${p2.nombre}"
        >

      </div>
    `;
        } else {
          imageHTML = `
      <div style="position:relative">

        <img
          src="${first.imagen}"
          class="item-image"
        >

      </div>
    `;
        }

        item.innerHTML = `
    ${imageHTML}

    <div class="item-title">
      ${group.nombre}
    </div>

    <div class="item-source">
      ${group.productos.length}
      variantes disponibles
    </div>

    <div class="item-price">
      Desde
      ${formatCurrency(Number(item.dataset.price))}
    </div>
  `;

        item.addEventListener("click", () => {
          openGroup(group);
        });

        return item;
      }

      function renderCart() {
        cart.innerHTML = "";

        const groupedIds = new Set();

        productos.forEach((product) => {
          const group = PRODUCT_GROUPS.find(
            (g) => g.productos[0] === product.id,
          );

          if (group) {
            cart.appendChild(createGroupCard(group));

            group.productos.forEach((id) => {
              if (id !== product.id) {
                groupedIds.add(id);
              }
            });

            return;
          }

          if (groupedIds.has(product.id)) {
            return;
          }

          cart.appendChild(createCartItem(product));
        });
      }

      function updateCartDisplay() {
        const items = document.querySelectorAll("#cart .cart-item");

        const selected = filter.value;

        const search = searchInput.value.toLowerCase().trim();

        let total = 0;
        let count = 0;

        items.forEach((item) => {
          const categoryMatch =
            selected === "all" || item.dataset.source === selected;

          const searchMatch = item.dataset.name.includes(search);

          const visible = categoryMatch && searchMatch;

          item.style.display = visible ? "block" : "none";

          if (visible) {
            total += Number(item.dataset.price);

            count += Number(item.dataset.count || 1);
          }
        });

        totalDisplay.textContent = `Total: ${formatCurrency(total)}`;

        statsTotal.textContent = formatCurrency(total);

        visibleProducts.textContent = count;

        currentCategory.textContent =
          selected === "all"
            ? "Todas"
            : selected.charAt(0).toUpperCase() + selected.slice(1);
      }

      filter.addEventListener("change", updateCartDisplay);

      searchInput.addEventListener("input", updateCartDisplay);

      window.addEventListener("DOMContentLoaded", () => {
        renderCart();
        updateCartDisplay();
      });
    </script>
  </body>
</html>
